<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SIDM2 — In a repo far, far away....</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
  }

  /* Starfield canvas — full-screen, behind everything */
  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* "In a repo far, far away...." — fades in, holds, fades out */
  #intro {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #4BD5EE;
    font-size: clamp(36px, 4.5vw, 80px);
    text-align: center;
    z-index: 3;
    opacity: 0;
    line-height: 1.4;
    letter-spacing: 0.02em;
    animation: introFade 6s ease-in-out forwards;
    animation-delay: 0.3s;
    pointer-events: none;
  }
  @keyframes introFade {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    78%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Star Wars-style crawl with a FIXED viewport.
     Architecture (key insight from analyzing the actual film):
       Each line of text should APPEAR at the bottom of the screen
       at full size, then RECEDE as it scrolls up, then disappear at
       the top. To get that effect, the rotated element must stay
       anchored to the bottom of the viewport (so its bottom edge is
       always "near" / full-size); the CONTENT inside scrolls UP
       through the rotated frame.

     - #crawl-container: fixed-position viewport-sized box with the
       perspective property. Top of viewport is z=far, bottom is z=close.
     - #crawl: 100vh-tall window anchored to the bottom of the
       container. Rotated rotateX(25deg) so its top recedes. Crawl
       has overflow:hidden so content scrolling beyond it is clipped.
     - #crawl-content: the actual changelog content. Animates `top`
       from 100% (below the viewport window, off-screen) to
       -(content-height) (above the viewport window). The content
       passes through the rotated frame, with each line transitioning
       from the bottom (full size) to the top (small, far). */
  #crawl-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    overflow: hidden;
    perspective: 500px;
    perspective-origin: 50% 100%;
    opacity: 0;
    animation: crawlContainerFadeIn 0.5s ease-in forwards;
    animation-delay: 6s;
  }
  @keyframes crawlContainerFadeIn {
    to { opacity: 1; }
  }

  #fade-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 55%;
    background-image: linear-gradient(
      to bottom,
      black 0%,
      black 25%,
      transparent 100%
    );
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    animation: crawlContainerFadeIn 0.5s ease-in forwards;
    animation-delay: 6s;
  }

  /* The rotated viewport. Bottom anchored to viewport bottom, height
     = full viewport, tilted backward. Content inside scrolls through. */
  #crawl {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: min(85%, 1100px);
    height: 100vh;
    transform-origin: 50% 100%;
    transform: translateX(-50%) rotateX(25deg);
    overflow: hidden;
  }

  /* The actual scrolling content. Starts below the rotated viewport,
     scrolls up through it, exits at the top. */
  #crawl-content {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    color: #FFE81F;
    font-weight: bold;
    text-align: justify;
    font-size: clamp(56px, 6vw, 96px);
    line-height: 1.5;
    letter-spacing: 0.04em;
    text-shadow: 0 0 8px rgba(255, 232, 31, 0.35);
    animation: crawlScroll var(--crawl-duration, 90s) linear forwards;
    animation-delay: 6.3s;
    will-change: top;
  }
  @keyframes crawlScroll {
    0%   { top: 100%; }
    100% { top: calc(-1 * var(--content-height, 4000px)); }
  }

  #crawl h1 {
    text-align: center;
    font-size: 1.6em;
    margin: 0 0 0.6em;
    letter-spacing: 0.05em;
  }
  #crawl h2 {
    text-align: center;
    font-size: 1.3em;
    margin: 0 0 1.4em;
    letter-spacing: 0.04em;
  }
  #crawl h3 {
    text-align: center;
    font-size: 1.05em;
    margin: 1em 0 0.5em;
  }
  #crawl p { margin-bottom: 1em; }
  #crawl ul { list-style: none; margin: 0.5em 0 1.2em; padding: 0; }
  #crawl li {
    margin: 0.4em 0;
    padding-left: 1em;
    text-align: left;
    text-indent: -1em;
  }
  #crawl li::before { content: "• "; color: #FFE81F; }
  #crawl pre,
  #crawl code {
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    color: #FFC81F;
  }
  #crawl pre {
    white-space: pre-wrap;
    margin: 0.5em 0;
  }
  #crawl strong { font-weight: 900; }

  /* Replay & status — small UI in the corner */
  #status {
    position: fixed;
    bottom: 0.6em; left: 0.8em;
    color: #888;
    background: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    z-index: 10;
    pointer-events: none;
    max-width: 60vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #replay {
    position: fixed;
    bottom: 0.6em; right: 0.8em;
    color: #888;
    background: rgba(0,0,0,0.4);
    border: 1px solid #444;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    z-index: 10;
  }
  #replay:hover { color: #FFE81F; border-color: #FFE81F; }

  #music {
    position: fixed;
    bottom: 0.6em; right: 6em;
    color: #888;
    background: rgba(0,0,0,0.4);
    border: 1px solid #444;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    z-index: 10;
  }
  #music:hover { color: #FFE81F; border-color: #FFE81F; }
  #music.playing { color: #FFE81F; border-color: #FFE81F; }
  #music.missing { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="intro">In a repo far,<br>far away....</div>
<div id="fade-overlay"></div>
<div id="crawl-container">
  <div id="crawl">
    <div id="crawl-content">
      <h1 id="episode">Episode XIV</h1>
      <h2 id="title">A NEW COMMIT</h2>
      <div id="body">
        <p>The galaxy still loads. The latest entry has yet to arrive
           from the central archive of GitHub....</p>
      </div>
    </div>
  </div>
</div>
<!-- Drop a "star-wars-theme.mp3" next to star.html and it'll auto-play
     when the crawl begins. If autoplay is blocked the music button
     becomes clickable. Original John Williams composition is © Lucasfilm/
     Disney, so the file isn't shipped with this repo. -->
<audio id="theme" preload="auto" src="./star-wars-theme.mp3"></audio>
<button id="music" type="button" title="Toggle music">♪ music</button>
<div id="status">booting hyperdrive...</div>
<button id="replay" type="button" title="Replay crawl">↻ replay</button>

<!-- Inlined CHANGELOG.md latest-version section. Refresh with:
       py -3 pyscript/update_star_html.py
     Embedding bypasses the file:// fetch-block, so the page works
     when opened directly from disk. Falls back to live GitHub fetch
     if this block is empty (e.g., for the GitHub-hosted version). -->
<script id="changelog-data" type="text/plain">
## [3.4.0] - 2026-05-08

### Added
- **Editor fidelity push** — Laxity-driver SF2 output now structurally matches
  the bundled SF2II reference corpus across all 9 header blocks, the aux chain,
  and the Block 3 column data formats. After F10-load:
  - Tracks 1/2/3 show real notes (D-1, D#1, F-1, etc.) instead of `???` markers
  - Each voice's orderlist column shows multiple pattern transitions
    (e.g. Stinsen voice 0: `a000 a001 a002 a003 a004 a005`) instead of one
    block of bytes
  - F1 Commands view shows real labels: Slide Up, Slide Down, Vibrato,
    Portamento, Set ADSR, Set Filter, Set Wave, Set Pulse, Set Speed,
    Set Volume, Arpeggio, Note Cut, Legato, Retrigger, Delay, End
  - F2 Instruments view shows clean 6-byte rows (AD, SR, HR, Filter, Pulse,
    Wave) instead of NP21-format bytes through Driver-11 lens
  - F3/F4/F5 Wave/Pulse/Filter views show structured data, not garbage
  - Editor parses + opens at ≥60% per-attempt rate (Stinsen) with retry-30 budget

- **Multi-pattern segmentation** (`sidm2/np21_pattern_segmenter.py`).
  Each voice's flat NP21 byte stream is split at instrument-prefix
  boundaries (`$A0-$BF`) into multiple SF2-display patterns. Round-trip
  property guarantees the segments concatenate back to the original
  byte stream byte-for-byte, defending shadow-buffer audio fidelity.
  For Stinsen voice 0: 6 segments. Voice 1: 1 (no internal instr changes).
  Voice 2: 7. Total 14 patterns vs. previous 3.

- **Multi-pattern runtime translator** (`_emit_multipat_translator`,
  ~87 bytes of 6502 at `$0F8E`). Walks each voice's orderlist range,
  concatenates referenced segments into the voice's shadow slot, writes
  NP21 0xFF + 0x00 loop terminator. Required `HANDLER_BASE` move from
  `$0FA0` to `$0F90` (translator window grew from 77B to 92B).
  Restores criterion-3 contract (edits to SF2 patterns propagate to
  playback through the translator on every PLAY tick) for the new
  multi-pattern structure.

- **Driver-11-format display tables** in the SF2 edit area.
  - `Stage 3` — Instrument table emits clean 6-byte rows
    (`AD, SR, HR, Filter, Pulse, Wave`) at `gen.instr_addr`. Block 3
    Instruments column repointed at the new table.
  - `Stage 4` — Wave/Pulse/Filter tables emitted in their respective
    Driver-11 column counts (Wave=2, Pulse=3, Filter=3). Block 3
    column addresses repointed at the new tables.
  - Display-only: edits to F2/F3/F4/F5 don't propagate to playback
    yet (NP21 binary at `$1000` keeps reading its own table data).

- **Block 9 (DriverInstrumentDataDescriptor) populated**.
  Was 1-byte placeholder; now 4 descriptors (41 bytes) verbatim from
  the reference SF2: Wave/Pulse/Filter/HR table-program lookups
  pointing at byte positions 5/4/3/2 of our 6-byte instrument rows.
  The earlier "non-empty Block 9 always crashes" claim was a false
  attribution — it was actually unrelated post-parse instability.

- **Bundled `[3, 2, 1, 4, 5, END]` aux chain**.
  Was `[5, 4, END]` with a missing aux-pointer write at `$0FFB`
  (aux pointer was always zero, so SF2II skipped the chain). All
  five aux blocks now emitted with body formats decoded from
  `auxilary_data_*.cpp::RestoreFromSaveData`:
  - id=3 PlayMarkers v2: 1 layer, 0 markers
  - id=2 HardwarePreferences v1: SIDModel 8580, Region PAL
  - id=1 EditingPreferences v1: Sharp notation, highlight interval 4
  - id=4 TableText v2: real Commands + Instruments names, padded
    with empty strings to Block 3 row counts (Commands=64,
    Instruments=32) plus reference's mystery `id=64` 256-empty entry
  - id=5 Songs v2: song name from PSID title (truncated 16 chars)

- **Stage 8 Path A — embed-binary fallback for non-Laxity SIDs**.
  New `_inject_player_raw_minimal()` handles Galway, Hubbard, NP20,
  etc. by embedding the SID's compiled binary verbatim and emitting
  minimal SF2 headers + handler stubs. Trampoline at `$1000` provides
  zig64-trace compatibility (zig64 hardcodes `$1000` as INIT entry).
  Verified on Hubbard's Commando: zig64 trace shows real SID writes
  (`osc3_control $41 = pulse`, ADSR `$09/$9F`, etc.). Editor F10-load
  remains broken for non-Laxity (deterministic post-parse crash;
  documented in `docs/stage8_5_findings.md`).

- **`star.html`** — single-file Star Wars opening-crawl viewer for the
  CHANGELOG. Fetches the latest entry, renders as yellow perspective
  scroll over a twinkling starfield with the canonical
  "In a repo far, far away...." intro. Replay button bottom-right.

### Fixed
- **OL ptr / Seq ptr tables now populated at conversion time**
  (`_build_np21_sf2_edit_area`). Previously zero-filled with a
  comment "editor writes" — but SF2II reads them on F10-load to
  locate orderlists + sequences. Voice OL ptrs decoded to `$00xx`
  (zero page), so the editor read garbage.

- **Voice orderlists prepend `0xA0` transposition marker**.
  The orderlist parser initializes `current_transposition=0`, and
  the renderer (`component_track.cpp:548`) does
  `inTransposition = stored - 0xA0`. Without a leading `0xA0`,
  every note got `+(-160)` transposition and rendered as `???`
  outside the displayable range.

- **Block 1 driver name encoded in PETSCII**. Lowercase letters
  `a-z` → bytes `0x01-0x1A`. Quiets the `sf2_lint` warning and
  matches the bundled corpus.

- **Aux chain pointer at C64 `$0FFB`**. Two bugs in
  `_inject_auxiliary_data`: (1) the pointer was never written;
  (2) the offset computation used `self.load_address` (PSID's
  load = `$0000`) instead of the SF2 PRG load (`$0D7E`). Result
  was that the appended aux blocks were unreachable garbage.

- **TableText body encoding** (`_build_table_text_data`).
  - `text_count` must equal the Block 3 row count for the table
    (Commands=64, Instruments=32), not the number of names we
    extracted. Padded with empty strings.
  - `table_id` packed as `u32 LE` (defensive; was signed `i32`).
  - Mirror the reference's 3-entry shape with the third entry
    `table_id=64`, 256 empty strings.

- **Songs body format** (`_build_description_data`). Old emit was
  3 pascal strings (name/author/copyright) — wrong format for aux
  block id=5. Rewrote to emit the format
  `AuxilaryDataSongs::RestoreFromSaveData` expects:
  `[song_count][selected_song]` then per-song pascal strings.

- **Focus-stealing protection in `pyscript/sf2_open_in_editor.py`**:
  bare `SetForegroundWindow` was raising on Windows protection
  refusals, breaking every retry. Wrapped in `try/except`; the
  click-on-title-bar below forces focus regardless.

### Investigated
- **Original SF2 architectural mismatch**. Comparison of
  `Original_SF2/Laxity/Laxity - Stinsen - Last Night Of 89.sf2`
  revealed it is a **Driver 11** ("The Standard") SF2 hand-authored
  by Laxity (the person), not a Laxity-NP21-driver SF2. Both files
  play the same song; structurally fundamentally different.
  Path C (hybrid: keep NP21 player, polish Driver-11-format editor
  metadata) chosen as the strategic direction; Path B (full
  transpilation to Driver 11) rejected as multi-week with high
  zig64-trace regression risk.

- **NP21 has no pattern table**. The "voice byte stream" the
  player reads is a flat event stream — each byte dispatched by
  value (note / duration / instrument / command / loop). Laxity's
  original SF2 splits the same stream into 128 patterns purely as
  editor-side metadata that gets compiled away. So when converting
  from a SID file we don't have access to the original musical
  pattern boundaries — Stage 2's instrument-prefix split is a
  structurally-valid but heuristic best-effort.

- **Non-Laxity editor crash root cause untested**
  (`docs/stage8_5_findings.md`). Bisected against aux chain
  content, Block 9 descriptor count, and `$1000` trampoline — none
  fixed it. Leading hypothesis: SF2II's editor 6502 emulator
  doesn't fully implement KERNAL routines / CIA-timer IRQs that
  Hubbard/Galway players require. zig64's emulator does, hence
  audio works there but not in the editor.

### Tools
- `pyscript/np21_pattern_segmenter.py` — pure-function pattern
  splitter with round-trip property test
- `pyscript/analyze_laxity_pattern_split.py` — reverse-engineering
  helper that compares our NP21 voice stream byte-by-byte against
  the original SF2's orderlist + pattern bodies
- `tests/test_corpus_regression.py` + `tests/golden/*.trace.csv`
  — Stinsen + Unboxed zig64 frame-perfect regression gate
- `pyscript/sf2_open_in_editor.py` — user-facing F10-load wrapper
  with retry-30 + title verification + focus-stealing tolerance

### Verified
- Stinsen zig64 trace: 1909/1909 SID register writes match
  baseline (frame-perfect)
- Unboxed zig64 trace: 2733/2733 (frame-perfect)
- Hubbard's Commando (Stage 8 Path A): zig64 trace shows real SID
  register writes — audio plays correctly
- F10-load editor pass rate: ≥60% per attempt for Stinsen with
  multi-pattern segmentation, Block 9, and full aux chain in place
- `pyscript/sf2_lint.py` "all checks pass" on PETSCII name (was
  WARN); CRIT warnings on INIT/STOP/PLAY entry-point ranges remain
  (these are deliberate — handler stubs live outside the
  `[$1000, $1900)` driver range)
- Total: 794 tests passing (unchanged from v3.3.0 — no test
  removals, only behavior corrections)

### Note
- This release is editor-fidelity-focused. Audio fidelity (the
  v3.3.0 frame-perfect contract) is unchanged.
- F10-load pass rate dropped from ~70% per attempt (pre-Stage 2)
  to ~20-30% per attempt (post-Stage 2 multi-pattern). Mitigated
  by raising `pyscript/sf2_open_in_editor.py` retry budget from
  15 to 30; cumulative success > 99%. Investigation of the
  underlying SF2II heap-state crash is upstream-side and out of
  scope.
- Editing instruments / wave / pulse / filter tables in F2-F5 does
  NOT yet propagate to playback — the criterion-3 translator
  bridges sequences only. A future stage could add per-table
  translators at the cost of more `$0F00`-region 6502 budget.
- Stage 8 Path B (per-driver pattern extraction for Galway/Hubbard
  editor view) and Stage 7 (edit-affects-playback for non-sequence
  data) deferred as multi-week investments.

---
</script>

<script>
(function () {
  // ===================== Starfield =====================
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const count = Math.floor((window.innerWidth * window.innerHeight) / 4500);
    stars = new Array(count).fill(0).map(() => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.2 + 0.2,
      phase: Math.random() * 2 * Math.PI,
      speed: Math.random() * 0.04 + 0.015,
    }));
  }
  window.addEventListener('resize', resize);
  resize();

  function drawStars(tMs) {
    const t = tMs * 0.001;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    for (const s of stars) {
      const a = 0.45 + 0.55 * Math.sin(s.phase + t * s.speed * 5);
      ctx.fillStyle = `rgba(255, 255, 255, ${a.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, 2 * Math.PI);
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ===================== Changelog fetch =====================
  // Repo is detected from the page URL when it's hosted on github.io;
  // otherwise we hardcode SIDM2conv (where this file lives).
  const DEFAULT_OWNER = 'MichaelTroelsen';
  const DEFAULT_REPO  = 'SIDM2conv';
  const branch = 'master';

  // Sibling CHANGELOG.md takes priority (works when served over local
  // HTTP from the repo folder). Falls back to GitHub raw URLs if the
  // local fetch fails (e.g., the page is hosted elsewhere).
  const CHANGELOG_URLS = [
    `./CHANGELOG.md`,
    `https://raw.githubusercontent.com/${DEFAULT_OWNER}/${DEFAULT_REPO}/${branch}/CHANGELOG.md`,
    `https://raw.githubusercontent.com/${DEFAULT_OWNER}/${DEFAULT_REPO}/main/CHANGELOG.md`,
  ];
  const COMMITS_URL = `https://api.github.com/repos/${DEFAULT_OWNER}/${DEFAULT_REPO}/commits?per_page=1`;

  const statusEl  = document.getElementById('status');
  const episodeEl = document.getElementById('episode');
  const titleEl   = document.getElementById('title');
  const bodyEl    = document.getElementById('body');

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // Pull the latest VERSION entry from a Keep-a-Changelog formatted file.
  // We look specifically for the first `## [X.Y.Z]...` heading (skipping
  // `# Changelog`, `## Historical Changelogs`, `## [Unreleased]`, etc.) and
  // capture everything until the next `## [` heading.
  function parseLatestChangelogEntry(md) {
    const lines = md.split(/\r?\n/);
    let title = '';
    let body = [];
    let inSection = false;
    for (const line of lines) {
      const versionMatch = line.match(/^##\s+\[(\d+(?:\.\d+){0,3})\]\s*(?:-\s*(.*))?$/);
      if (versionMatch) {
        if (!inSection) {
          const version = versionMatch[1];
          const date    = (versionMatch[2] || '').trim();
          title = date ? `v${version} — ${date}` : `v${version}`;
          inSection = true;
          continue;
        }
        // Hit the next version entry → stop capturing
        break;
      }
      // Stop on any other top-level (##) heading inside the captured body
      if (inSection && /^##\s+/.test(line)) break;
      if (inSection) body.push(line);
    }
    return { title: title || 'Latest changes', body: body.join('\n').trim() };
  }

  // Tiny markdown -> HTML; only what we need for changelog content.
  function renderMd(md) {
    let html = escapeHtml(md);
    // Fenced code blocks first (so their internal markdown is preserved)
    html = html.replace(/```([\s\S]*?)```/g, (_, c) => `␀PRE␀${c}␀/PRE␀`);
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(?<!\*)\*([^*\n]+)\*/g, '<em>$1</em>');
    // Sub-headings inside the section body
    html = html.replace(/^###\s+(.*)$/gm, '<h3>$1</h3>');
    // Bullet lists
    html = html.replace(/^[\-*]\s+(.*)$/gm, '<li>$1</li>');
    html = html.replace(/(?:^<li>.*<\/li>\n?)+/gm, m => `<ul>${m}</ul>`);
    // Paragraphs (split on blank lines, skip already-tagged blocks)
    html = html.split(/\n{2,}/).map(part => {
      const p = part.trim();
      if (!p) return '';
      if (/^<(ul|h\d|␀PRE␀)/.test(p) || p.startsWith('<')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    // Restore code blocks
    html = html.replace(/␀PRE␀([\s\S]*?)␀\/PRE␀/g, (_, c) => `<pre>${c}</pre>`);
    return html;
  }

  async function tryFetch(url) {
    statusEl.textContent = `→ ${url.replace(/^https:\/\//, '')}`;
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status} from ${url}`);
    return r.text();
  }

  async function loadChangelog() {
    // Primary path: read inlined changelog data from <script id="changelog-data">.
    // This is what update_star_html.py populates and bypasses every
    // CORS/file:// concern by simply embedding the markdown in the file.
    const inlineEl = document.getElementById('changelog-data');
    const inline   = inlineEl ? inlineEl.textContent.trim() : '';
    if (inline && !inline.startsWith('PLACEHOLDER')) {
      const { title, body } = parseLatestChangelogEntry(inline);
      titleEl.textContent = title;
      bodyEl.innerHTML    = renderMd(body) || '<p>(no body in this entry)</p>';
      statusEl.textContent = 'loaded embedded changelog';
      return;
    }
    // Fallback: try fetch() — works when served via http(s).
    if (location.protocol === 'file:') {
      titleEl.textContent = 'PLACEHOLDER UNFILLED';
      bodyEl.innerHTML = `
        <p>The embedded changelog block is empty.</p>
        <p>Run from the repo root:</p>
        <pre>py -3 pyscript/update_star_html.py</pre>
        <p>then reload this page.</p>
      `;
      statusEl.textContent = 'embedded changelog placeholder; run update_star_html.py';
      return;
    }
    for (const url of CHANGELOG_URLS) {
      try {
        const md = await tryFetch(url);
        const { title, body } = parseLatestChangelogEntry(md);
        titleEl.textContent = title;
        bodyEl.innerHTML    = renderMd(body) || '<p>(no body in this entry)</p>';
        statusEl.textContent = `loaded CHANGELOG.md from ${url.split('/')[5]}/${branch}`;
        return;
      } catch (e) {
        // fall through to next source
      }
    }
    // Fall back to latest commit message via API
    try {
      statusEl.textContent = `→ ${COMMITS_URL.replace(/^https:\/\//, '')}`;
      const r = await fetch(COMMITS_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const arr = await r.json();
      if (!arr.length) throw new Error('no commits');
      const c = arr[0];
      const lines = (c.commit.message || '').split('\n');
      titleEl.textContent = lines[0] || 'Latest commit';
      const rest = lines.slice(1).join('\n').trim();
      bodyEl.innerHTML = renderMd(rest) || '<p>(commit had no body)</p>';
      episodeEl.textContent = `Commit ${c.sha.substring(0, 7)}`;
      statusEl.textContent = `loaded latest commit ${c.sha.substring(0, 7)}`;
    } catch (e) {
      titleEl.textContent = 'The Force was disturbed.';
      bodyEl.innerHTML = `
        <p>Unable to reach the central archive. The dark side has
           interfered with the holonet.</p>
        <p style="font-family:monospace;font-size:0.7em;">Error: ${escapeHtml(String(e.message))}</p>
      `;
      statusEl.textContent = `fetch failed: ${e.message}`;
    }
  }

  // ===================== Content distance measurement =====================
  // The crawl-content's `top` animates from 100% (just below the rotated
  // viewport, off-screen) to -(content-height) (fully past the top of
  // the viewport). JS measures the actual rendered height after the
  // CHANGELOG content is in the DOM and writes it as a CSS variable so
  // the keyframe ranges to the right distance regardless of changelog
  // size or viewport width.
  function setCrawlDistance() {
    const content = document.getElementById('crawl-content');
    if (!content) return;
    const distance = content.scrollHeight + window.innerHeight;
    // Pace the scroll at ~70 px/sec so a small entry doesn't blast past
    // and a huge entry isn't unwatchably slow. Clamped to 60–180s.
    const duration = Math.max(60, Math.min(180, Math.round(distance / 70)));
    content.style.setProperty('--content-height', distance + 'px');
    content.style.setProperty('--crawl-duration', duration + 's');
  }
  window.addEventListener('resize', setCrawlDistance);

  // ===================== Music =====================
  // Try to play ./star-wars-theme.mp3 (user-supplied, not shipped) when
  // the crawl begins. Browsers usually require a user-gesture for audio
  // autoplay, so attach a click fallback to the music button.
  const audio   = document.getElementById('theme');
  const musicBtn = document.getElementById('music');
  let musicState = 'idle';   // 'idle' | 'playing' | 'paused' | 'missing'

  function tryPlay() {
    if (!audio) return;
    audio.play().then(() => {
      musicState = 'playing';
      musicBtn.classList.add('playing');
    }).catch(() => {
      // Autoplay blocked — leave button enabled so user can opt in.
      musicState = 'paused';
    });
  }
  audio.addEventListener('error', () => {
    musicState = 'missing';
    musicBtn.classList.add('missing');
    musicBtn.title = 'Drop "star-wars-theme.mp3" next to star.html to enable';
  });
  musicBtn.addEventListener('click', () => {
    if (musicState === 'missing') return;
    if (audio.paused) {
      audio.play();
      musicBtn.classList.add('playing');
      musicState = 'playing';
    } else {
      audio.pause();
      musicBtn.classList.remove('playing');
      musicState = 'paused';
    }
  });
  // Kick off audio at crawl-start (matches animation-delay above).
  setTimeout(tryPlay, 6300);

  // ===================== Replay =====================
  document.getElementById('replay').addEventListener('click', () => {
    const intro     = document.getElementById('intro');
    const overlay   = document.getElementById('fade-overlay');
    const container = document.getElementById('crawl-container');
    const crawl     = document.getElementById('crawl');
    [intro, overlay, container, crawl].forEach(el => {
      if (!el) return;
      el.style.animation = 'none';
      void el.offsetWidth;             // force reflow so the animation can restart
      el.style.animation = '';
    });
    setCrawlDistance();
    // Restart audio at the same time
    if (audio) {
      audio.currentTime = 0;
      setTimeout(tryPlay, 6300);
    }
  });

  loadChangelog().then(setCrawlDistance);
  // also remeasure once everything's painted, in case fonts caused reflow
  setTimeout(setCrawlDistance, 200);
})();
</script>
</body>
</html>
