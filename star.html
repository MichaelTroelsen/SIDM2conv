<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SIDM2 — In a repo far, far away....</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
  }

  /* Starfield canvas — full-screen, behind everything */
  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* "In a repo far, far away...." — fades in, holds, fades out */
  #intro {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #4BD5EE;
    font-size: clamp(36px, 4.5vw, 80px);
    text-align: center;
    z-index: 3;
    opacity: 0;
    line-height: 1.4;
    letter-spacing: 0.02em;
    animation: introFade 6s ease-in-out forwards;
    animation-delay: 0.3s;
    pointer-events: none;
  }
  @keyframes introFade {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    78%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Star Wars-style crawl with a FIXED viewport.
     Architecture (key insight from analyzing the actual film):
       Each line of text should APPEAR at the bottom of the screen
       at full size, then RECEDE as it scrolls up, then disappear at
       the top. To get that effect, the rotated element must stay
       anchored to the bottom of the viewport (so its bottom edge is
       always "near" / full-size); the CONTENT inside scrolls UP
       through the rotated frame.

     - #crawl-container: fixed-position viewport-sized box with the
       perspective property. Top of viewport is z=far, bottom is z=close.
     - #crawl: 100vh-tall window anchored to the bottom of the
       container. Rotated rotateX(25deg) so its top recedes. Crawl
       has overflow:hidden so content scrolling beyond it is clipped.
     - #crawl-content: the actual changelog content. Animates `top`
       from 100% (below the viewport window, off-screen) to
       -(content-height) (above the viewport window). The content
       passes through the rotated frame, with each line transitioning
       from the bottom (full size) to the top (small, far). */
  #crawl-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    overflow: hidden;
    perspective: 500px;
    /* perspective-origin tuned so the rotated crawl's top projects to
       around 12% from the screen top — close enough to give the
       impression of text reaching upward, but with breathing room of
       starfield above it. */
    perspective-origin: 50% 20%;
    /* Tight fade only at the very top — text reaches near the top edge
       before disappearing into the starfield. */
    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(0,0,0,0.4) 4%,
      black 10%,
      black 100%
    );
    mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(0,0,0,0.4) 4%,
      black 10%,
      black 100%
    );
    opacity: 0;
    animation: crawlContainerFadeIn 0.5s ease-in forwards;
    animation-delay: 13.8s;
  }
  @keyframes crawlContainerFadeIn {
    to { opacity: 1; }
  }

  /* fade-overlay disabled — replaced by the tighter mask on
     #crawl-container above. Kept the empty rule so the HTML element
     stays harmless if present. */
  #fade-overlay { display: none; }

  /* The rotated viewport. Bottom anchored to viewport bottom, height
     = full viewport, tilted backward. Content inside scrolls through. */
  #crawl {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: min(92%, 1500px);
    height: 100vh;
    transform-origin: 50% 100%;
    transform: translateX(-50%) rotateX(20deg);
    overflow: hidden;
  }

  /* The actual scrolling content. Starts below the rotated viewport,
     scrolls up through it, exits at the top. */
  #crawl-content {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    color: #FFE81F;
    font-weight: bold;
    text-align: justify;
    font-size: clamp(56px, 6vw, 96px);
    line-height: 1.5;
    letter-spacing: 0.04em;
    text-shadow: 0 0 8px rgba(255, 232, 31, 0.35);
    animation: crawlScroll var(--crawl-duration, 90s) linear forwards;
    animation-delay: 14.1s;
    will-change: top;
  }
  @keyframes crawlScroll {
    0%   { top: 100%; }
    100% { top: calc(-1 * var(--content-height, 4000px)); }
  }

  #crawl h1 {
    text-align: center;
    font-size: 1.6em;
    margin: 0 0 0.6em;
    letter-spacing: 0.05em;
  }
  #crawl h2 {
    text-align: center;
    font-size: 1.3em;
    margin: 0 0 1.4em;
    letter-spacing: 0.04em;
  }
  #crawl h3 {
    text-align: center;
    font-size: 1.05em;
    margin: 1em 0 0.5em;
  }
  #crawl p { margin-bottom: 1em; }
  #crawl ul { list-style: none; margin: 0.5em 0 1.2em; padding: 0; }
  #crawl li {
    margin: 0.4em 0;
    padding-left: 1em;
    text-align: left;
    text-indent: -1em;
  }
  #crawl li::before { content: "• "; color: #FFE81F; }
  #crawl pre,
  #crawl code {
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    color: #FFC81F;
  }
  #crawl pre {
    white-space: pre-wrap;
    margin: 0.5em 0;
  }
  #crawl strong { font-weight: 900; }

  /* Bottom-right control bar — replay + music buttons side by side */
  #controls {
    position: fixed;
    bottom: 0.6em; right: 0.8em;
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  #controls button {
    color: #888;
    background: rgba(0,0,0,0.4);
    border: 1px solid #444;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
  }
  #controls button:hover { color: #FFE81F; border-color: #FFE81F; }
  #music.playing { color: #FFE81F; border-color: #FFE81F; }
  #music.missing { opacity: 0.4; cursor: not-allowed; }

  /* SIDM2 logo — Star Wars-style title that comes in HUGE up close, then
     recedes into the distance and vanishes. Does NOT scroll. Sits behind
     the camera-near plane via 3D scale, fades out as it shrinks. */
  #logo {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(10);
    color: #FFE81F;
    font-family: 'Arial Black', 'Trebuchet MS', sans-serif;
    font-weight: 900;
    font-size: clamp(60px, 8vw, 140px);
    letter-spacing: 0.06em;
    text-align: center;
    z-index: 4;
    opacity: 0;
    text-shadow: 0 0 12px rgba(255, 232, 31, 0.5);
    pointer-events: none;
    animation: logoRecede 7s ease-in forwards;
    animation-delay: 6.5s;
    will-change: transform, opacity;
  }
  @keyframes logoRecede {
    0%   { transform: translate(-50%, -50%) scale(10); opacity: 0; }
    8%   { transform: translate(-50%, -50%) scale(8);  opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.05); opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="intro">In a repo far,<br>far away....</div>
<div id="logo">SIDM2</div>
<div id="fade-overlay"></div>
<div id="crawl-container">
  <div id="crawl">
    <div id="crawl-content">
      <h1 id="episode">Episode XIV</h1>
      <h2 id="title">A NEW COMMIT</h2>
      <div id="body">
        <p>The galaxy still loads. The latest entry has yet to arrive
           from the central archive of GitHub....</p>
      </div>
    </div>
  </div>
</div>
<!-- Looks for ./starwarsintro.mp3 next to star.html; auto-plays when
     the crawl begins (or via the ♪ button if the browser blocks
     autoplay). Original John Williams composition is © Lucasfilm/
     Disney, so the file is gitignored, not committed. -->
<audio id="theme" preload="auto" src="./starwarsintro.mp3"></audio>
<div id="controls">
  <button id="music"  type="button" title="Toggle music">♪ music</button>
  <button id="replay" type="button" title="Replay crawl">↻ replay</button>
</div>

<!-- Inlined CHANGELOG.md latest-version section. Refresh with:
       py -3 pyscript/update_star_html.py
     Embedding bypasses the file:// fetch-block, so the page works
     when opened directly from disk. Falls back to live GitHub fetch
     if this block is empty (e.g., for the GitHub-hosted version). -->
<script id="changelog-data" type="text/plain">
## [3.4.1] - 2026-05-09

### Fixed
- **Block 3 byte format: `TextFieldSize` instead of `NameLen`**
  (`sf2_header_generator.py`, commit `04f5829`). SF2II's
  `DriverInfo::ParseDriverTables` reads each table descriptor as
  `[type:1][id:1][text_field_size:1][NUL-terminated name][...]`. Our writer
  was emitting `[type:1][id:1][NameLen:1][NUL-terminated name][...]` —
  coincidentally parsing because `NameLen` happens to be a small u8 like a
  real `tfs` would be. Every table ended up with `m_TextFieldSize =
  strlen(name)+1`, so `PrepareLayout` built a `ComponentTableRowElementsWithText`
  for all 9 driver tables. The `WithText` component's `Refresh` writes a
  stray byte `0xDE`/`0xDF` when its `AuxilaryDataTableText` lookup misses
  on a table with no text entries (Arp/Tempo/HR/Init/Wave/Pulse/Filter — only
  Commands and Instruments have text in our aux block id=4). That stray byte
  landed on `m_MainTextField`'s MSB ~50% of the time, deterministically
  content-triggered and heap-layout-dependent.

  Now `TableDescriptor` takes a `text_field_size` keyword arg (default 0),
  emits at the byte position SF2II expects, and Block 3 sets `tfs=12` for
  Commands, `tfs=18` for Instruments, `tfs=0` for the other 7 — matches
  bundled `Driver 11 Test - Arpeggio.sf2` exactly. Names emit in PETSCII
  (lowercase a-z → 0x01-0x1A) for bug-for-bug compatibility with the
  bundled corpus.

  **Solo-load pass rate (no retry wrapper):**
  - Stinsen N=15: 7/15 (47%) → 15/15 (100%)
  - Unboxed N=15: similar regime → 15/15 (100%)
  - Angular + Beast (was documented 0% deterministic crash): → 100%
    The same Block 3 bug was their root cause too — small NP21 binary heap
    layout put `m_MainTextField` in every stray-write's path, while
    Stinsen's heap put it there ~50% of the time.

- **Empty-patterns fallback returns 5-tuple, not 4-tuple**
  (`_build_np21_sf2_edit_area`, commit `4950b04`). The Stage 2.5
  multi-pattern translator change widened the contract to 5 (added
  `voice_pat_counts`), but the `num_patterns == 0` fallback path was
  missed. Files where `ch_seq_ptr` at `$0A1C/$0A1F` doesn't yield valid
  sequence pointers (Angular, Beast, Cycles, Colorama — small NP21
  binaries with non-Stinsen player layouts) failed conversion with
  `not enough values to unpack (expected 5, got 4)`. Returning
  `voice_pat_counts=[1,1,1]` (each voice points at the single placeholder
  pattern) restores arity.

### Added
- **Editor-only Block 3 column tables in the SF2 edit area** (Stage 8.5,
  commit `e3efadc`). Arp/Tempo/HR/Init were hardcoded at `$C000-$C300`,
  safe for Laxity NP21 (binary at `$1000+`, those addresses read zeros from
  emulated RAM) but COLLIDE with non-Laxity binaries that load at `$C000`
  (e.g., Hubbard's *Action_Biker* at `$C000-$CBC1`). When SF2II's editor
  rendered those tables it read the SID's executable code as
  instrument/wave/pulse/filter cells. `SF2HeaderGenerator` now has
  per-instance `arp_addr`/`tempo_addr`/`hr_addr`/`init_table_addr` overrides
  (defaults at `$C000-$C300` for Laxity); `_inject_player_raw_minimal`
  allocates 4 zero-filled placeholder regions inside the edit area and
  points the gen attrs at them. Doesn't fix the residual Stage 8.5 crash
  but is structurally correct for any non-Laxity SID.

- **Stage 8.5 debugging toolkit** (commits `a4f0b2c`, `38447a5`, `3f94d55`):
  - `appverifier-setup.bat` / `appverifier-disable.bat` — admin one-shot
    AppVerifier (Heaps + Memory + Locks + WER LocalDumps DumpType=2).
  - `appverifier-tune.bat` / `appverifier-heaps-only.bat` /
    `appverifier-pageheap.bat` — narrower instrumentation variants. Heaps-only
    via direct `reg add` on the IFEO key (the `appverif.exe /enable Heaps` CLI
    didn't persist on this Windows build); standalone PageHeap via NT
    `GlobalFlag = 0x02000000` + `PageHeapFlags = 0x3` for catching OOB writes
    at the writing instruction.
  - `pyscript/sf2_debug_inspect_v2.py` — extends the v1 inspector with
    `--watch <addr> [--size N]` (hardware write-watchpoint via DR0/DR7 on
    every thread of the target), `--attach <pid>` (DebugActiveProcess instead
    of CreateProcessW DEBUG_PROCESS — slightly less heap-perturbative), and
    a dbghelp `StackWalk64`-backed stack walk that resolves PC + return
    addresses to module-relative RVAs.
  - `pyscript/disasm_rva.py` — disassembles around an RVA in `SIDFactoryII.exe`
    via `pefile + capstone`. Handy for decoding stack frames captured by
    the v2 debugger.
  - `docs/stage8.5_debugging_toolkit.md` — workflow doc tying both the
    AppVerifier path and the HW-watchpoint path together, with DR7
    bit-layout reference.

- **`pyscript/sf2_corpus_pass_rate.py`** — N-trial harness across an 11-file
  corpus spanning Laxity NP21, Galway, Hubbard, Tel_Jeroen, Fun_Fun, and
  SF2-exported. Clears stale outputs before each conversion (the converter
  refuses to overwrite without `--overwrite`). Prints per-file PASS/CRASH
  count and totals.

- **`pyscript/diff_block3.py`** — decodes Block 3 from a `.sf2` and prints
  side-by-side comparison against bundled. Spotted the NameLen vs TextFieldSize
  mismatch by showing every table's tfs as a small int that turned out to be
  the name length.

### Investigated
- **Stage 8.5 root cause LOCALIZED in upstream SF2II source**
  (`docs/stage8.5_debugging_toolkit.md` — full repro recipe).
  Under PageHeap-mode AppVerifier + DEBUG_PROCESS, the v2 debugger
  caught a fresh crash signature that the original 0xC0000005 dumps had
  been masking:

  ```
  AV: READ at 0x1
  RIP = SIDFactoryII.exe + 0x63fab
  movzx edx, byte ptr [rcx + 1]   ; rcx loaded from *rdi == NULL
  ```

  Disassembly at `+0x63fab` is a byte-level transform loop walking a
  `std::string`'s storage (`*rdi` = begin pointer, `*(rdi+8)` = end
  pointer); `*rdi == NULL` shouldn't happen for a properly-constructed
  MSVC `std::string`. Stack walk via `StackWalk64`:
    `[0] +0x63fab → [1] +0x7a1b1 → [2] +0x66cb9 (right after a virtual
    call; next insn zeroes [rbx+0xa0] = m_TableColorRules per source
    layout) → [3..5] startup glue`.

  So the crash is inside SF2II's destructor sequence for
  `m_TableColorRules`. One contained `std::string` has a NULL begin
  pointer — uninitialized OR already-freed. Under normal heap the freed
  page is recycled and the read picks up safe garbage; under PageHeap
  freed pages are unmapped → guard-memory deref.

  **Bug is in SF2II's source, not in our writer.** Reported upstream as
  [Chordian/sidfactory2#211](https://github.com/Chordian/sidfactory2/issues/211)
  with full disassembly, stack walk, repro recipe, and load_addr
  correlation table. Out of scope to fix from SIDM2 side.

### Verified
- Solo F10-load pass rate (no retry wrapper, `pyscript/sf2_pass_rate.py
  N=15`): Stinsen 15/15, Unboxed 15/15.
- Broader 11-file corpus pass rate (`pyscript/sf2_corpus_pass_rate.py
  N=5`): **45/55 = 82%** (up from previous "60% Stinsen / 27% Unboxed"
  baseline). Two failures are Hubbard *Action_Biker* and Soundmonitor
  *Byte_Bite* — both blocked on Chordian/sidfactory2#211.
- Stinsen + Unboxed playback unchanged: zig64 trace 1910/1910 + 2734/2734
  byte-for-byte match against golden trace.
- Total: 794 tests passing (unchanged from v3.4.0 — Block 3 emission
  doesn't affect zig64 register-level playback).

### Note
- The Stage 8.5 crash is upstream-side. Two corpus files
  (Action_Biker, Byte_Bite) currently fail F10-load; conversion still
  succeeds and the resulting `.sf2` plays correctly via VICE / sidplayer.
  When upstream resolves Chordian/sidfactory2#211, re-run
  `pyscript/sf2_corpus_pass_rate.py 5` to confirm 11/11.
- The `appverifier-setup.bat` enables Heaps + Memory + Locks + several
  ancillary providers via `/faults` — this combination crashes SF2II
  before init completes (`STATUS_ASSERTION_FAILURE 0xC0000421` within
  ~50ms of launch). On this Windows build, `appverif.exe /disable
  Memory /for SIDFactoryII.exe` doesn't actually unset providers (the
  registry retains them after the command). Use
  `appverifier-pageheap.bat` (PageHeap-only via NT global flags) for
  the OOB-write hunt instead.

---
</script>

<script>
(function () {
  // ===================== Starfield =====================
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const count = Math.floor((window.innerWidth * window.innerHeight) / 4500);
    stars = new Array(count).fill(0).map(() => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.2 + 0.2,
      phase: Math.random() * 2 * Math.PI,
      speed: Math.random() * 0.04 + 0.015,
    }));
  }
  window.addEventListener('resize', resize);
  resize();

  function drawStars(tMs) {
    const t = tMs * 0.001;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    for (const s of stars) {
      const a = 0.45 + 0.55 * Math.sin(s.phase + t * s.speed * 5);
      ctx.fillStyle = `rgba(255, 255, 255, ${a.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, 2 * Math.PI);
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ===================== Changelog fetch =====================
  // Repo is detected from the page URL when it's hosted on github.io;
  // otherwise we hardcode SIDM2conv (where this file lives).
  const DEFAULT_OWNER = 'MichaelTroelsen';
  const DEFAULT_REPO  = 'SIDM2conv';
  const branch = 'master';

  // Sibling CHANGELOG.md takes priority (works when served over local
  // HTTP from the repo folder). Falls back to GitHub raw URLs if the
  // local fetch fails (e.g., the page is hosted elsewhere).
  const CHANGELOG_URLS = [
    `./CHANGELOG.md`,
    `https://raw.githubusercontent.com/${DEFAULT_OWNER}/${DEFAULT_REPO}/${branch}/CHANGELOG.md`,
    `https://raw.githubusercontent.com/${DEFAULT_OWNER}/${DEFAULT_REPO}/main/CHANGELOG.md`,
  ];
  const COMMITS_URL = `https://api.github.com/repos/${DEFAULT_OWNER}/${DEFAULT_REPO}/commits?per_page=1`;

  // Status text is no longer rendered (was a corner debug line). Keep a
  // sink so existing `statusEl.textContent = ...` writes are harmless.
  const statusEl  = { set textContent(_v) {} };
  const episodeEl = document.getElementById('episode');
  const titleEl   = document.getElementById('title');
  const bodyEl    = document.getElementById('body');

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // Pull the latest VERSION entry from a Keep-a-Changelog formatted file.
  // We look specifically for the first `## [X.Y.Z]...` heading (skipping
  // `# Changelog`, `## Historical Changelogs`, `## [Unreleased]`, etc.) and
  // capture everything until the next `## [` heading.
  function parseLatestChangelogEntry(md) {
    const lines = md.split(/\r?\n/);
    let title = '';
    let body = [];
    let inSection = false;
    for (const line of lines) {
      const versionMatch = line.match(/^##\s+\[(\d+(?:\.\d+){0,3})\]\s*(?:-\s*(.*))?$/);
      if (versionMatch) {
        if (!inSection) {
          const version = versionMatch[1];
          const date    = (versionMatch[2] || '').trim();
          title = date ? `v${version} — ${date}` : `v${version}`;
          inSection = true;
          continue;
        }
        // Hit the next version entry → stop capturing
        break;
      }
      // Stop on any other top-level (##) heading inside the captured body
      if (inSection && /^##\s+/.test(line)) break;
      if (inSection) body.push(line);
    }
    return { title: title || 'Latest changes', body: body.join('\n').trim() };
  }

  // Tiny markdown -> HTML; only what we need for changelog content.
  function renderMd(md) {
    let html = escapeHtml(md);
    // Fenced code blocks first (so their internal markdown is preserved)
    html = html.replace(/```([\s\S]*?)```/g, (_, c) => `␀PRE␀${c}␀/PRE␀`);
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(?<!\*)\*([^*\n]+)\*/g, '<em>$1</em>');
    // Sub-headings inside the section body
    html = html.replace(/^###\s+(.*)$/gm, '<h3>$1</h3>');
    // Bullet lists
    html = html.replace(/^[\-*]\s+(.*)$/gm, '<li>$1</li>');
    html = html.replace(/(?:^<li>.*<\/li>\n?)+/gm, m => `<ul>${m}</ul>`);
    // Paragraphs (split on blank lines, skip already-tagged blocks)
    html = html.split(/\n{2,}/).map(part => {
      const p = part.trim();
      if (!p) return '';
      if (/^<(ul|h\d|␀PRE␀)/.test(p) || p.startsWith('<')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    // Restore code blocks
    html = html.replace(/␀PRE␀([\s\S]*?)␀\/PRE␀/g, (_, c) => `<pre>${c}</pre>`);
    return html;
  }

  async function tryFetch(url) {
    statusEl.textContent = `→ ${url.replace(/^https:\/\//, '')}`;
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status} from ${url}`);
    return r.text();
  }

  async function loadChangelog() {
    // Primary path: read inlined changelog data from <script id="changelog-data">.
    // This is what update_star_html.py populates and bypasses every
    // CORS/file:// concern by simply embedding the markdown in the file.
    const inlineEl = document.getElementById('changelog-data');
    const inline   = inlineEl ? inlineEl.textContent.trim() : '';
    if (inline && !inline.startsWith('PLACEHOLDER')) {
      const { title, body } = parseLatestChangelogEntry(inline);
      titleEl.textContent = title;
      bodyEl.innerHTML    = renderMd(body) || '<p>(no body in this entry)</p>';
      statusEl.textContent = 'loaded embedded changelog';
      return;
    }
    // Fallback: try fetch() — works when served via http(s).
    if (location.protocol === 'file:') {
      titleEl.textContent = 'PLACEHOLDER UNFILLED';
      bodyEl.innerHTML = `
        <p>The embedded changelog block is empty.</p>
        <p>Run from the repo root:</p>
        <pre>py -3 pyscript/update_star_html.py</pre>
        <p>then reload this page.</p>
      `;
      statusEl.textContent = 'embedded changelog placeholder; run update_star_html.py';
      return;
    }
    for (const url of CHANGELOG_URLS) {
      try {
        const md = await tryFetch(url);
        const { title, body } = parseLatestChangelogEntry(md);
        titleEl.textContent = title;
        bodyEl.innerHTML    = renderMd(body) || '<p>(no body in this entry)</p>';
        statusEl.textContent = `loaded CHANGELOG.md from ${url.split('/')[5]}/${branch}`;
        return;
      } catch (e) {
        // fall through to next source
      }
    }
    // Fall back to latest commit message via API
    try {
      statusEl.textContent = `→ ${COMMITS_URL.replace(/^https:\/\//, '')}`;
      const r = await fetch(COMMITS_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const arr = await r.json();
      if (!arr.length) throw new Error('no commits');
      const c = arr[0];
      const lines = (c.commit.message || '').split('\n');
      titleEl.textContent = lines[0] || 'Latest commit';
      const rest = lines.slice(1).join('\n').trim();
      bodyEl.innerHTML = renderMd(rest) || '<p>(commit had no body)</p>';
      episodeEl.textContent = `Commit ${c.sha.substring(0, 7)}`;
      statusEl.textContent = `loaded latest commit ${c.sha.substring(0, 7)}`;
    } catch (e) {
      titleEl.textContent = 'The Force was disturbed.';
      bodyEl.innerHTML = `
        <p>Unable to reach the central archive. The dark side has
           interfered with the holonet.</p>
        <p style="font-family:monospace;font-size:0.7em;">Error: ${escapeHtml(String(e.message))}</p>
      `;
      statusEl.textContent = `fetch failed: ${e.message}`;
    }
  }

  // ===================== Content distance measurement =====================
  // The crawl-content's `top` animates from 100% (just below the rotated
  // viewport, off-screen) to -(content-height) (fully past the top of
  // the viewport). JS measures the actual rendered height after the
  // CHANGELOG content is in the DOM and writes it as a CSS variable so
  // the keyframe ranges to the right distance regardless of changelog
  // size or viewport width.
  function setCrawlDistance() {
    const content = document.getElementById('crawl-content');
    if (!content) return;
    const distance = content.scrollHeight + window.innerHeight;
    // Pace the scroll at ~50 px/sec — enough time to read each line.
    // Clamped to 90–240s.
    const duration = Math.max(90, Math.min(240, Math.round(distance / 50)));
    content.style.setProperty('--content-height', distance + 'px');
    content.style.setProperty('--crawl-duration', duration + 's');
  }
  window.addEventListener('resize', setCrawlDistance);

  // ===================== Music =====================
  // Try to play ./star-wars-theme.mp3 (user-supplied, not shipped) when
  // the crawl begins. Browsers usually require a user-gesture for audio
  // autoplay, so attach a click fallback to the music button.
  const audio   = document.getElementById('theme');
  const musicBtn = document.getElementById('music');
  let musicState = 'idle';   // 'idle' | 'playing' | 'paused' | 'missing'
  let userToggledMusic = false;  // once true, gesture-primer stops auto-resuming

  function tryPlay() {
    if (!audio) return;
    audio.play().then(() => {
      musicState = 'playing';
      musicBtn.classList.add('playing');
    }).catch(() => {
      // Autoplay blocked — leave button enabled so user can opt in.
      musicState = 'paused';
    });
  }
  audio.addEventListener('error', () => {
    musicState = 'missing';
    musicBtn.classList.add('missing');
    musicBtn.title = 'Drop "starwarsintro.mp3" next to star.html to enable';
  });
  musicBtn.addEventListener('click', (e) => {
    if (musicState === 'missing') return;
    // Without this, the document-level primeOnGesture handler also fires
    // on this same click and immediately re-starts playback — making the
    // pause action invisible to the user.
    e.stopPropagation();
    userToggledMusic = true;
    if (audio.paused) {
      audio.play();
      musicBtn.classList.add('playing');
      musicState = 'playing';
    } else {
      audio.pause();
      musicBtn.classList.remove('playing');
      musicState = 'paused';
    }
  });
  // Kick off audio at crawl-start (matches animation-delay above).
  setTimeout(tryPlay, 14100);

  // Browsers block autoplay without a user gesture. If the autoplay
  // attempt got blocked, the very first click/keypress anywhere on
  // the page will start the music — no need for the user to find the
  // ♪ button.
  function primeOnGesture() {
    // Once the user has explicitly toggled music (play OR pause), respect
    // that choice — don't keep auto-resuming from background gestures.
    if (userToggledMusic) return;
    if (audio && audio.paused && musicState !== 'missing') {
      tryPlay();
    }
  }
  document.addEventListener('click',     primeOnGesture, { once: false });
  document.addEventListener('keydown',   primeOnGesture, { once: false });
  document.addEventListener('touchstart', primeOnGesture, { once: false });

  // ===================== Replay =====================
  document.getElementById('replay').addEventListener('click', () => {
    const intro     = document.getElementById('intro');
    const logo      = document.getElementById('logo');
    const overlay   = document.getElementById('fade-overlay');
    const container = document.getElementById('crawl-container');
    const crawl     = document.getElementById('crawl');
    const content   = document.getElementById('crawl-content');
    [intro, logo, overlay, container, crawl, content].forEach(el => {
      if (!el) return;
      el.style.animation = 'none';
      void el.offsetWidth;             // force reflow so the animation can restart
      el.style.animation = '';
    });
    setCrawlDistance();
    // Restart audio at the same time
    if (audio) {
      audio.currentTime = 0;
      setTimeout(tryPlay, 14100);
    }
  });

  loadChangelog().then(setCrawlDistance);
  // also remeasure once everything's painted, in case fonts caused reflow
  setTimeout(setCrawlDistance, 200);
})();
</script>
</body>
</html>
